# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Set fish as the default shell
set-option -g default-shell "/usr/bin/fish"

set -g mouse on
set-option -sa terminal-overrides ",xterm*Tc"

bind r source-file ~/.tmux.conf \; display-message "Reloaded"

set -g base-index 1
set -g renumber-windows on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g default-terminal "screen-256color"
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

set -gq allow-passthrough on


# Enable automatic session restoration
set -g @continuum-restore 'on'
# Theme settings
set -g @dracula-plugins " git cpu-usage ram-usage attached-clients "
# attached-clients
set -g @dracula-clients-minimum 2
# Git
set -g @dracula-git-no-repo-message "!git"
set -g @dracula-git-show-repo-name true
# Theme
set -g @dracula-cpu-usage-colors "dark_purple dark_gray"
set -g @dracula-ram-usage-colors "light_purple dark_gray"
set -g @dracula-attached-clients-colors "red dark_gray"
set -g @dracula-battery-label "󰁹"
set -g @dracula-show-left-icon "#S"

# Set vi-mode
set-window-option -g mode-keys vi
# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key N command-prompt "new-session -s '%%'"

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
